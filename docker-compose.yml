version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1212
      MYSQL_DATABASE: bancoteste01
    ports:
      - "3356:3306"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge