# Configuraš§es do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3356/bancoteste01?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC


# Configuraš§es de autenticašŃo do banco de dados
spring.datasource.username=root

# Configuraš§es de autenticašŃo do banco de dados
spring.datasource.password=1212

# Configuraš§es do JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update

# Configuraš§es de exibišŃo de SQL no console
spring.jpa.show-sql=true


# Configuraš§es do driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraš§es de pool de conex§es HikariCP
spring.datasource.hikari.initialization-fail-timeout=30000

# Configuraš§es de dialeto do Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configuraš§es de dialeto do Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect