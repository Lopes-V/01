# Configurań§es do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3356/bancoteste01?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC


# Configurań§es de autenticańŃo do banco de dados
spring.datasource.username=root

# Configurań§es de autenticańŃo do banco de dados
spring.datasource.password=1212

# Configurań§es do JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update

# Configurań§es de exibińŃo de SQL no console
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.orm.jdbc.bind=TRACE


# Configurań§es do driver JDBC para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurań§es de pool de conex§es HikariCP
spring.datasource.hikari.initialization-fail-timeout=30000

# Configurań§es de dialeto do Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Configurań§es de dialeto do Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect